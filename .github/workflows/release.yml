name: release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_PHP_VERSION: 8.2.28
  TOOLCHAIN_CACHE_VERSION: toolchain-v20260625

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Environment Info
        run: |
          echo "${{ github.event.head_commit.message }}"
          echo "${{ github.event.workflow_run.head_commit.message }}"
          echo $PATH
          env
          docker info
          id -u
          id -g
          who
          cat /etc/os-release
          hostnamectl
          uname -s
          uname -m
          uname -r

          cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c
          cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l
          cat /proc/cpuinfo | grep "cpu cores" | uniq
          cat /proc/cpuinfo| grep "processor"| wc -l
          lscpu

          export IPV6=$(ip -6 address show  | grep inet6 | awk '{print $2}' | cut -d'/' -f1 | sed -n '2p')
          export IPV4=$(ip -4 address show  | grep inet | grep -v 127.0.0 | awk '{print $2}' | cut -d'/' -f1 | sed -n '1p')
          echo $IPV4
          echo $IPV6
          echo "X_IPV6=${IPV6}" >> $GITHUB_ENV
          echo "X_IPV4=${IPV4}" >> $GITHUB_ENV

          sudo apt install -y jq curl

          echo ${{ github.actor }}
          echo ${{ github.repository }}
          echo ${{ github.repository_owner }}
          echo ${{ github.ref_name }}

      - name: Prepare Build Environment
        run: |
          sudo mkdir -p /usr/local/swoole-cli
          uid=$(id -u) && gid=$(id -g) && sudo chown -R ${uid}:${gid} /usr/local/swoole-cli

          mkdir -p ${{ github.workspace }}/var/build-github-action-container/

      - name: Cache PHP Runtime
        uses: actions/cache@v4
        id: php-runtime-cache-x86_64
        with:
          path: ${{ github.workspace }}/runtime
          key: ${{ runner.os }}-x86_64-php-runtime

      - name: Cache PHP Vendor
        uses: actions/cache@v4
        id: php-vendor-cache-x86_64
        with:
          path: ${{ github.workspace }}/vendor
          key: ${{ runner.os }}-x86_64-php-vendor

      - name: Cache Dependency Source Code Tarball
        uses: actions/cache@v4
        id: pool-cache
        with:
          path: ${{ github.workspace }}/pool/
          key: source-code-tarball-pool

      - name: Cache all-library
        uses: actions/cache@v4
        id: all-library-cache-x86_64
        with:
          path: /usr/local/swoole-cli
          key: ${{ env.TOOLCHAIN_CACHE_VERSION }}-${{ github.ref_name }}-${{ runner.os }}-x86_64-all-library

      - name: Cache swoole-cli-builder-image
        uses: actions/cache@v4
        id: swoole-cli-builder-image-cache-x86_64
        with:
          path: ${{ github.workspace }}/var/build-github-action-container/swoole-cli-builder-image.tar
          key: ${{ env.TOOLCHAIN_CACHE_VERSION }}-${{ runner.os }}-x86_64-swoole-cli-builder-image

      - name: Prepare swoole-cli-builder-image
        run: |
          if [ -f ${{ github.workspace }}/var/build-github-action-container/swoole-cli-builder-image.tar ] ; then
              docker load -i  ${{ github.workspace }}/var/build-github-action-container/swoole-cli-builder-image.tar
          else
              bash .github/workflows/build-alpine-builder-container.sh
          fi

      - name: Prepare Runtime and Libraries and Extensions
        run: |
          set -x
          mkdir -p pool/lib
          mkdir -p pool/ext
          mkdir -p bin/
          mkdir -p runtime/
          if [ ! -f runtime/php/php ] ; then
              bash  setup-php-runtime.sh
          fi

          CACHE_NUM=$(ls -A pool/lib/ | wc -l)
          LIB_NUM=$(ls -A sapi/src/builder/library/ | wc -l)
          echo `expr $LIB_NUM - $CACHE_NUM`
          bash sapi/download-box/download-box-get-archive-from-server.sh

          ls -A pool/lib/
          ls -A /usr/local/swoole-cli/

      - name: Build
        uses: addnab/docker-run-action@v3
        with:
          image: swoole-cli-builder:latest
          options: -v ${{ github.workspace }}:/work -w /work -e BUILD_PHP_VERSION=${{ env.BUILD_PHP_VERSION }} -v /usr/local/swoole-cli:/usr/local/swoole-cli
          run: |
            set -eux
            uname -m
            export PATH=/work/runtime/php:$PATH
            alias php="php -d curl.cainfo=/work/runtime/php/cacert.pem -d openssl.cafile=/work/runtime/php/cacert.pem"

            sh  sapi/quickstart/linux/alpine-init.sh
            composer install  --no-interaction --no-autoloader --no-scripts --profile --no-dev
            composer dump-autoload --optimize --profile --no-dev

            php prepare.php  +nginx --with-c-compiler=gcc --with-build-type=release

            bash make-install-deps.sh
            bash make.sh clean-openssl-cached
            bash make.sh clean-nginx
            rm -rf /usr/local/swoole-cli/openssl /usr/local/swoole-cli/nginx

            bash make.sh all-library

            bash make.sh config
            bash make.sh build
            bash make.sh test
            bash make.sh archive

      - name: Show Build Result
        run: |
          ls ./bin/nginx
          ./bin/nginx/sbin/nginx -V
          file ./bin/nginx/sbin/nginx
          readelf -h ./bin/nginx/sbin/nginx

      - name: Get release archive name
        run: |
          APP_VERSION=$(cat ./APP_VERSION)
          APP_NAME=$(cat ./APP_NAME)
          ARCHIVE_NAME="${APP_NAME}-${APP_VERSION}-linux-x64.tar.xz"
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          ls -lh "./${ARCHIVE_NAME}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          retention-days: 7
          path: ./${{ env.ARCHIVE_NAME }}

  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Show Environment Info
        run: |
          echo $PATH
          env
          docker info
          id -u
          id -g
          who
          cat /etc/os-release
          hostnamectl
          uname -s
          uname -m
          uname -r

          cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c
          cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l
          cat /proc/cpuinfo | grep "cpu cores" | uniq
          cat /proc/cpuinfo| grep "processor"| wc -l
          lscpu

          export IPV6=$(ip -6 address show  | grep inet6 | awk '{print $2}' | cut -d'/' -f1 | sed -n '2p')
          export IPV4=$(ip -4 address show  | grep inet | grep -v 127.0.0 | awk '{print $2}' | cut -d'/' -f1 | sed -n '1p')
          echo $IPV4
          echo $IPV6
          echo "X_IPV6=${IPV6}" >> $GITHUB_ENV
          echo "X_IPV4=${IPV4}" >> $GITHUB_ENV

      - name: Prepare Build Environment
        run: |
          sudo mkdir -p /usr/local/swoole-cli
          uid=$(id -u) && gid=$(id -g) && sudo chown -R ${uid}:${gid} /usr/local/swoole-cli

          mkdir -p ${{ github.workspace }}/var/build-github-action-container/

      - name: Cache PHP Runtime
        uses: actions/cache@v4
        id: php-runtime-cache-aarch64
        with:
          path: ${{ github.workspace }}/runtime
          key: ${{ runner.os }}-aarch64-php-runtime

      - name: Cache PHP Vendor
        uses: actions/cache@v4
        id: php-vendor-cache-aarch64
        with:
          path: ${{ github.workspace }}/vendor
          key: ${{ runner.os }}-aarch64-php-vendor

      - name: Cache Dependency Source Code Tarball
        uses: actions/cache@v4
        id: pool-cache
        with:
          path: ${{ github.workspace }}/pool/
          key: source-code-tarball-pool

      - name: Cache all-library
        uses: actions/cache@v4
        id: all-library-cache-aarch64
        with:
          path: /usr/local/swoole-cli
          key: ${{ env.TOOLCHAIN_CACHE_VERSION }}-${{ github.ref_name }}-${{ runner.os }}-aarch64-all-library

      - name: Cache swoole-cli-builder-image
        uses: actions/cache@v4
        id: swoole-cli-builder-image-cache-aarch64
        with:
          path: ${{ github.workspace }}/var/build-github-action-container/swoole-cli-builder-image.tar
          key: ${{ env.TOOLCHAIN_CACHE_VERSION }}-${{ runner.os }}-aarch64-swoole-cli-builder-image

      - name: Prepare swoole-cli-builder-image
        run: |
          if [ -f ${{ github.workspace }}/var/build-github-action-container/swoole-cli-builder-image.tar ] ; then
              docker load -i  ${{ github.workspace }}/var/build-github-action-container/swoole-cli-builder-image.tar
          else
              bash .github/workflows/build-alpine-builder-container.sh --platform "linux/arm64"
          fi

      - name: Prepare Runtime and Libraries and Extensions
        run: |
          set -x
          mkdir -p pool/lib
          mkdir -p pool/ext
          mkdir -p bin/
          mkdir -p runtime/
          if [ ! -f runtime/php/php ] ; then
              bash  setup-php-runtime.sh
          fi
          bash sapi/download-box/download-box-get-archive-from-server.sh
          ls -A pool/lib/
          ls -A /usr/local/swoole-cli/

      - name: Build
        uses: addnab/docker-run-action@v3
        with:
          image: swoole-cli-builder:latest
          options: -v ${{ github.workspace }}:/work -w /work -e BUILD_PHP_VERSION=${{ env.BUILD_PHP_VERSION }} -v /usr/local/swoole-cli:/usr/local/swoole-cli
          run: |
            set -eux
            uname -m
            export PATH=/work/runtime/php/:$PATH
            alias php="php -d curl.cainfo=/work/runtime/php/cacert.pem -d openssl.cafile=/work/runtime/php/cacert.pem"

            sh  sapi/quickstart/linux/alpine-init.sh
            composer install  --no-interaction --no-autoloader --no-scripts --profile --no-dev
            composer dump-autoload --optimize --profile --no-dev

            php prepare.php  +nginx --with-c-compiler=gcc --with-build-type=release

            bash make-install-deps.sh
            bash make.sh clean-openssl-cached
            bash make.sh clean-nginx
            rm -rf /usr/local/swoole-cli/openssl /usr/local/swoole-cli/nginx

            bash make.sh all-library

            bash make.sh config
            bash make.sh build
            bash make.sh test
            bash make.sh archive

      - name: Show Build Result
        run: |
          ls ./bin/nginx
          ./bin/nginx/sbin/nginx -V
          file ./bin/nginx/sbin/nginx
          readelf -h ./bin/nginx/sbin/nginx

      - name: Get release archive name
        run: |
          APP_VERSION=$(cat ./APP_VERSION)
          APP_NAME=$(cat ./APP_NAME)
          ARCHIVE_NAME="${APP_NAME}-${APP_VERSION}-linux-arm64.tar.xz"
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          ls -lh "./${ARCHIVE_NAME}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64
          retention-days: 7
          path: ./${{ env.ARCHIVE_NAME }}

  build-macos-aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Environment Info
        run: |
          set -x
          uname -s
          uname -m
          uname -r
          sysctl -n hw.ncpu
          env
          echo $HOME
          sw_vers
          xcodebuild -version
          brew config
          xcrun --show-sdk-path
          ls -lh $(xcrun --show-sdk-path)
          clang --version

          ifconfig
          export IPV6=$(ifconfig en0  | grep "inet6 " | grep -v "inet6 fe80:" | awk '{print $2}' | cut -d'/' -f1 | sed -n '2p')
          export IPV4=$(ifconfig en0 | grep "inet " | grep -v 127.0.0 | awk '{print $2}' | cut -d'/' -f1 | sed -n '1p')
          echo $IPV4
          echo $IPV6
          echo "X_IPV6=${IPV6}" >> $GITHUB_ENV
          echo "X_IPV4=${IPV4}" >> $GITHUB_ENV

      - name: Prepare Build Environment
        run: |
          bash sapi/quickstart/macos/macos-init.sh

          export PATH="/opt/homebrew/opt/libtool/bin:$PATH"
          ls -lha /opt/homebrew/opt/libtool/bin/
          libtoolize --version
          libtool --help-all

          CURRENT_USER=$(whoami)
          echo ${CURRENT_USER}
          sudo mkdir -p /usr/local/swoole-cli
          CURRENT_USER=$(whoami) && sudo chown -R ${CURRENT_USER}:staff /usr/local/swoole-cli

      - name: Cache PHP Runtime
        uses: actions/cache@v4
        id: php-runtime-cache
        with:
          path: ${{ github.workspace }}/runtime
          key: ${{ runner.os }}-aarch64-php-runtime

      - name: Cache PHP Vendor
        uses: actions/cache@v4
        id: php-vendor-cache
        with:
          path: ${{ github.workspace }}/vendor
          key: ${{ runner.os }}-aarch64-php-vendor

      - name: Cache Dependency Source Code Tarball
        uses: actions/cache@v4
        id: pool-cache
        with:
          path: ${{ github.workspace }}/pool/
          key: source-code-tarball-pool

      - name: Cache all-library
        uses: actions/cache@v4
        id: all-library-cache
        with:
          path: /usr/local/swoole-cli
          key: ${{ env.TOOLCHAIN_CACHE_VERSION }}-${{ github.ref_name }}-${{ runner.os }}-aarch64-all-library

      - name: Prepare Runtime and Libraries and Extensions
        run: |
          set -x
          mkdir -p pool/lib
          mkdir -p pool/ext
          mkdir -p bin/
          mkdir -p runtime/
          if [ ! -f runtime/php/php ] ; then
              bash  setup-php-runtime.sh
          fi
          bash sapi/download-box/download-box-get-archive-from-server.sh
          ls -A pool/lib/
          ls -A /usr/local/swoole-cli/

      - name: prepare
        run: |
          export PATH=${{ github.workspace }}/runtime/php/:$PATH
          alias php="php -d curl.cainfo=${{ github.workspace }}/runtime/php/cacert.pem -d openssl.cafile=${{ github.workspace }}/runtime/php/cacert.pem"

          composer install  --no-interaction --no-autoloader --no-scripts --profile
          composer dump-autoload --optimize --profile

          php prepare.php  +nginx --with-build-type=release

      - name: Build
        run: |
          export PATH=${{ github.workspace }}/runtime/php/:$PATH

          bash make-install-deps.sh

          bash make.sh all-library

          bash make.sh config
          bash make.sh build
          bash make.sh test
          bash make.sh archive

      - name: Show Build Result
        run: |
          ls ./bin/nginx
          ./bin/nginx/sbin/nginx -V
          file ./bin/nginx/sbin/nginx
          otool -L ./bin/nginx/sbin/nginx

      - name: Get release archive name
        run: |
          APP_VERSION=$(cat ./APP_VERSION)
          APP_NAME=$(cat ./APP_NAME)
          ARCHIVE_NAME="${APP_NAME}-${APP_VERSION}-macos-arm64.tar.xz"
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          ls -lh "./${ARCHIVE_NAME}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          retention-days: 7
          path: ./${{ env.ARCHIVE_NAME }}

  release:
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86_64
      - build-linux-aarch64
      - build-macos-aarch64
    permissions:
      contents: write
    steps:
      - name: Download linux x64 archive
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x64
          path: release-assets

      - name: Download linux arm64 archive
        uses: actions/download-artifact@v4
        with:
          name: release-linux-arm64
          path: release-assets

      - name: Download macos arm64 archive
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: release-assets

      - name: Show release assets
        run: ls -lh release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.xz
